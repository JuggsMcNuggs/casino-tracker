<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diamond Casino Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,400&display=swap');

    :root {
      --bg: #090c10;
      --panel: #0f1318;
      --panel2: #141a22;
      --surface: #1a2230;
      --line: #1e2a3a;
      --line2: #263348;
      --text: #e4e8f0;
      --muted: #7a869e;
      --accent: #8b6cff;
      --accent-dim: rgba(139,108,255,.15);
      --accent-mid: rgba(139,108,255,.35);
      --cyan: #4ad3ff;
      --cyan-dim: rgba(74,211,255,.12);
      --good: #34d399;
      --good-dim: rgba(52,211,153,.12);
      --good-border: rgba(52,211,153,.5);
      --bad: #f87171;
      --bad-dim: rgba(248,113,113,.1);
      --bad-border: rgba(248,113,113,.45);
      --warn: #fbbf24;
      --warn-dim: rgba(251,191,36,.1);
      --warn-border: rgba(251,191,36,.45);
      --loa: #a78bfa;
      --loa-dim: rgba(167,139,250,.12);
      --loa-border: rgba(167,139,250,.5);
      --r: 12px;
      --r2: 16px;
      --shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 20;
      backdrop-filter: blur(16px);
      background: rgba(9,12,16,.85);
      border-bottom: 1px solid var(--line);
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 14px 20px; }
    .hdr-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .gem {
      width: 10px; height: 10px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--cyan));
      box-shadow: 0 0 14px rgba(139,108,255,.5);
    }
    .brand-name { font-weight: 900; font-size: 15px; letter-spacing: .3px; }
    .brand-sub { font-size: 11px; color: var(--muted); margin-left: 2px; }

    .hdr-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

    /* ── BUTTONS & INPUTS ── */
    input, select, button, textarea {
      font: inherit; color: var(--text);
      background: var(--surface);
      border: 1px solid var(--line2);
      border-radius: var(--r);
      padding: 8px 12px;
      outline: none;
      font-size: 13px;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: rgba(122,134,158,.6); }
    button { cursor: pointer; user-select: none; white-space: nowrap; }
    button:hover { border-color: var(--accent); }

    .btn-accent {
      background: var(--accent-dim);
      border-color: var(--accent-mid);
      color: #c4b5fd;
      font-weight: 700;
    }
    .btn-ghost { background: rgba(26,34,48,.6); }
    .btn-danger { background: var(--bad-dim); border-color: var(--bad-border); color: var(--bad); }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 8px; }
    .btn-icon {
      width: 30px; height: 30px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(26,34,48,.4); border-radius: 8px;
    }
    .btn-icon svg { width: 14px; height: 14px; }

    /* ── PILLS ── */
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700; white-space: nowrap;
      border: 1px solid var(--line2);
      background: rgba(26,34,48,.4);
    }
    .pill.good { border-color: var(--good-border); background: var(--good-dim); color: var(--good); }
    .pill.bad { border-color: var(--bad-border); background: var(--bad-dim); color: var(--bad); }
    .pill.warn { border-color: var(--warn-border); background: var(--warn-dim); color: var(--warn); }
    .pill.loa { border-color: var(--loa-border); background: var(--loa-dim); color: var(--loa); }
    .pill.accent { border-color: var(--accent-mid); background: var(--accent-dim); color: #c4b5fd; }

    /* ── SEARCH BAR ── */
    .search-bar {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      padding: 10px 0;
    }
    .search-bar input { flex: 1; min-width: 200px; }
    .search-bar select { min-width: 180px; }

    /* ── MAIN ── */
    main { max-width: 1200px; margin: 0 auto; padding: 16px 20px; }

    /* ── PANELS ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--r2);
      overflow: hidden;
    }
    .panel + .panel { margin-top: 12px; }
    .panel-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
    }
    .panel-head .h {
      font-size: 11px; text-transform: uppercase; letter-spacing: .8px;
      color: var(--muted); font-weight: 700;
    }
    .panel-body { padding: 14px 16px; }

    /* ── HUB GRID ── */
    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }

    .card {
      height: 180px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--r2);
      background: var(--panel);
      cursor: pointer;
      transition: border-color .12s, transform .08s;
      display: flex; flex-direction: column; justify-content: space-between;
      overflow: hidden;
    }
    .card:hover { border-color: var(--accent-mid); transform: translateY(-1px); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-name { font-weight: 900; font-size: 14px; line-height: 1.2; }
    .card-meta { color: var(--muted); font-size: 11px; margin-top: 3px; line-height: 1.3; }
    .card-hours { font-size: 22px; font-weight: 900; margin-top: auto; }
    .card-hours-sub { color: var(--muted); font-size: 11px; }
    .card-bottom { display: flex; justify-content: space-between; align-items: flex-end; gap: 8px; }
    .card-total { color: var(--muted); font-size: 11px; }

    /* ── PROFILE ── */
    .profile-header {
      padding: 16px;
      display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap;
    }
    .profile-name { font-size: 22px; font-weight: 900; }
    .profile-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .profile-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .profile-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: flex-start; }

    /* Basic Info rows */
    .info-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: var(--muted); min-width: 120px; font-size: 12px; }
    .info-val { display: flex; align-items: center; gap: 8px; text-align: right; }

    /* ── TRAINING (rebuilt) ── */
    .train-overview { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .train-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
      border: 1px solid var(--line2);
      background: rgba(26,34,48,.3);
      transition: border-color .12s;
    }
    .train-pill.done { border-color: var(--good-border); background: var(--good-dim); color: var(--good); }
    .train-pill.todo { opacity: .7; }
    .train-pill.locked { border-color: var(--warn-border); background: var(--warn-dim); color: var(--warn); opacity: .8; }
    .train-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
    .train-pill.done .dot { background: var(--good); }
    .train-pill.todo .dot { background: var(--muted); }
    .train-pill.locked .dot { background: var(--warn); }

    .train-detail {
      margin-top: 10px; padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(20,26,34,.6);
    }
    .train-detail-row {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 8px 0; border-bottom: 1px solid var(--line);
      font-size: 12px;
    }
    .train-detail-row:last-child { border-bottom: none; }

    /* ── CALENDAR ── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .cal-head { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); text-align: center; padding: 4px; font-weight: 700; }
    .cal-day {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      min-height: 72px;
      display: flex; flex-direction: column;
      cursor: default;
      transition: border-color .12s;
      position: relative;
    }
    .cal-day:hover { border-color: var(--accent-mid); }
    .cal-day .day-num { font-size: 11px; font-weight: 900; color: var(--muted); }
    .cal-day .day-label { font-size: 12px; font-weight: 700; margin-top: auto; }
    .cal-day .day-sub { font-size: 10px; color: var(--muted); }
    .cal-day.good { border-color: var(--good-border); background: var(--good-dim); }
    .cal-day.good .day-num { color: var(--good); }
    .cal-day.bad { border-color: var(--bad-border); background: var(--bad-dim); }
    .cal-day.bad .day-num { color: var(--bad); }
    .cal-day.loa { border-color: var(--loa-border); background: var(--loa-dim); }
    .cal-day.loa .day-num { color: var(--loa); }
    .cal-day .day-tags { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }
    .day-tag {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .day-tag.shift { background: var(--good); }
    .day-tag.training { background: var(--cyan); }
    .day-tag.interview { background: var(--accent); }
    .day-tag.event { background: var(--warn); }
    .day-tag.loa-tag { background: var(--loa); }

    /* ── FEEDBACK ENTRIES ── */
    .entry-card {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(20,26,34,.4);
      margin-bottom: 8px;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
    }
    .entry-card .entry-left { flex: 1; }
    .entry-card .entry-date { font-size: 11px; color: var(--muted); }
    .entry-card .entry-note { font-size: 12px; margin-top: 4px; white-space: pre-wrap; word-break: break-word; }
    .entry-card .entry-actions { display: flex; gap: 4px; flex-shrink: 0; }

    /* ── NOTE CARDS ── */
    .note-card {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--r);
      background: rgba(20,26,34,.4);
      margin-bottom: 8px;
    }
    .note-card .note-date { font-size: 11px; color: var(--muted); }
    .note-card .note-text { font-size: 12px; margin-top: 4px; white-space: pre-wrap; word-break: break-word; }

    /* ── HOURS CHART ── */
    .chart-bar-wrap { display: flex; flex-direction: column; gap: 4px; }
    .chart-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
    .chart-label { min-width: 120px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chart-bar-bg { flex: 1; height: 20px; background: var(--surface); border-radius: 6px; overflow: hidden; position: relative; }
    .chart-bar-fill { height: 100%; border-radius: 6px; transition: width .3s; }
    .chart-value { min-width: 60px; text-align: right; color: var(--muted); font-size: 11px; }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      display: none; align-items: center; justify-content: center;
      padding: 20px; z-index: 50;
    }
    .modal {
      width: min(640px, 100%);
      max-height: 85vh; overflow-y: auto;
      background: var(--panel2);
      border: 1px solid var(--line2);
      border-radius: var(--r2);
      box-shadow: var(--shadow);
    }
    .modal-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; background: var(--panel2); z-index: 2;
    }
    .modal-title { font-weight: 900; font-size: 14px; }
    .modal-body { padding: 14px 16px; }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--panel2); border: 1px solid var(--line2);
      border-radius: 999px; padding: 8px 16px;
      display: none; font-size: 12px; font-weight: 700; z-index: 80;
      box-shadow: var(--shadow);
    }

    .hint {
      padding: 10px 12px; border-radius: var(--r);
      border: 1px dashed var(--accent-mid);
      background: var(--accent-dim);
      font-size: 12px; line-height: 1.4; color: var(--text);
    }

    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .row > * { flex: 1; }
    .tight { flex: 0 0 auto; }
    .divider { height: 1px; background: var(--line); margin: 12px 0; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    textarea { width: 100%; min-height: 80px; resize: vertical; }

    table { border-collapse: collapse; width: 100%; }
    th, td { border-bottom: 1px solid var(--line); padding: 8px; font-size: 12px; vertical-align: top; }
    th { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); font-weight: 700; }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .hub-grid { grid-template-columns: 1fr; }
      .card { height: auto; min-height: 160px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="wrap">
      <div class="hdr-top">
        <div class="brand">
          <div class="gem"></div>
          <span class="brand-name">Diamond Casino</span>
          <span class="brand-sub" id="saveState">saved locally</span>
        </div>
        <div class="hdr-actions">
          <button class="btn-ghost btn-sm" id="overviewBtn">Hours Overview</button>
          <button class="btn-ghost btn-sm" id="promoBtn">Promo / EOTM</button>
          <button class="btn-ghost btn-sm" id="importCsvBtn">Import CSV</button>
          <input type="file" id="csvFile" accept=".csv,text/csv" style="display:none">
          <button class="btn-ghost btn-sm" id="exportBtn">Export</button>
          <button class="btn-ghost btn-sm" id="importBackupBtn">Import</button>
          <input type="file" id="backupFile" accept="application/json" style="display:none">
          <button class="btn-accent btn-sm" id="addPersonBtn">+ Person</button>
          <button class="btn-ghost btn-sm" id="backBtn" style="display:none;">← Back</button>
        </div>
      </div>
      <div class="search-bar" id="searchBar">
        <input id="search" placeholder="Search name, callsign, steam..." />
        <select id="sort">
          <option value="az">A → Z</option>
          <option value="dc">DC Number</option>
          <option value="month_desc">Hours: High → Low</option>
          <option value="month_asc">Hours: Low → High</option>
          <option value="total_desc">Total: High → Low</option>
          <option value="total_asc">Total: Low → High</option>
          <option value="recent">Most Recent</option>
          <option value="least_recent">Least Recent</option>
        </select>
        <button class="btn-ghost btn-sm" id="inactiveBtn">Inactive</button>
        <button class="btn-ghost btn-sm" id="pastBtn">Graveyard</button>
        <button class="btn-danger btn-sm" id="resetBtn">Reset</button>
      </div>
    </div>
  </header>

  <main>
    <!-- HUB -->
    <section id="hubView">
      <div class="hub-grid" id="cards"></div>
    </section>

    <!-- OVERVIEW (Hours chart) -->
    <section id="overviewView" style="display:none;">
      <div class="panel">
        <div class="panel-head">
          <div class="h">Monthly Hours Overview</div>
          <div class="row tight" style="gap:6px">
            <button class="btn-ghost btn-sm" id="ovPrev">←</button>
            <span class="pill" id="ovMonthLabel">Month</span>
            <button class="btn-ghost btn-sm" id="ovNext">→</button>
          </div>
        </div>
        <div class="panel-body" id="overviewBody">
          <div class="chart-bar-wrap" id="hoursChart"></div>
        </div>
      </div>
    </section>

    <!-- PROFILE -->
    <section id="profileView" style="display:none;">
      <!-- Profile header -->
      <div class="panel" id="profilePanel"></div>

      <!-- Basic Info -->
      <div class="panel">
        <div class="panel-head">
          <div class="h">Basic Info</div>
          <button class="btn-ghost btn-sm" id="editPersonBtn">Edit</button>
        </div>
        <div class="panel-body" id="basicInfo"></div>
      </div>

      <!-- Training -->
      <div class="panel">
        <div class="panel-head">
          <div class="h">Training</div>
          <div class="train-overview" id="trainSnap"></div>
        </div>
        <div class="panel-body" id="training"></div>
      </div>

      <!-- Calendar -->
      <div class="panel">
        <div class="panel-head">
          <div class="h">Calendar</div>
          <div class="row tight" style="gap:6px">
            <button class="btn-ghost btn-sm" id="pPrevMonth">←</button>
            <span class="pill" id="pMonthLabel">Month</span>
            <span class="pill accent" id="pCalTotal">0 hr</span>
            <button class="btn-ghost btn-sm" id="pNextMonth">→</button>
            <button class="btn-accent btn-sm" id="addCalEventBtn">+ Event</button>
          </div>
        </div>
        <div class="panel-body">
          <div id="loaBanner" style="display:none;margin-bottom:10px"></div>
          <div id="calendar"></div>
        </div>
      </div>

      <!-- Corrections/Commendations/Strikes -->
      <div class="panel">
        <div class="panel-head">
          <div class="h">Feedback</div>
          <div class="row tight" style="gap:6px">
            <span class="pill" id="strikePill">Strikes: 0</span>
            <button class="btn-ghost btn-sm" id="addDisciplineBtn">+ Entry</button>
          </div>
        </div>
        <div class="panel-body" id="discipline"></div>
      </div>

      <!-- Internal Notes -->
      <div class="panel">
        <div class="panel-head">
          <div class="h">Internal Notes</div>
          <button class="btn-ghost btn-sm" id="addNoteBtn">+ Note</button>
        </div>
        <div class="panel-body" id="notesList"></div>
      </div>
    </section>

    <!-- PROMO / EOTM REVIEW -->
    <section id="reviewView" style="display:none;">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="h">Promo / EOTM Review</div>
            <div class="muted small" id="reviewSub"></div>
          </div>
          <div class="row tight" style="gap:6px">
            <button class="btn-ghost btn-sm" id="reviewTabEotm">EOTM</button>
            <button class="btn-ghost btn-sm" id="reviewTabPromo">Promotions</button>
          </div>
        </div>
        <div class="panel-body" id="reviewBody"></div>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle">Modal</div>
        <button class="btn-ghost btn-sm" id="closeModalBtn">Close</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast">Copied</div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const STORE_KEY = "casinoTracker.local.v8";
const TZ = "America/Chicago";

const MIN_SHIFT_MINUTES = 30;
const MONTHLY_MIN_HOURS = 4;
const MONTHLY_MIN_MS = MONTHLY_MIN_HOURS * 60 * 60 * 1000;

const FIXED_ROLES = ["Security","Croupier","Bartender","Valet","Media"];
const RANKS = ["Trainee","Employee","Senior Employee","Supervisor","Manager","Director"];

function isMgmtCallsign(cs){
  const c = (cs||"").toUpperCase().replace(/\s+/g,"");
  const m = c.match(/^DC-?0?(1[0-9]|[1-9])$/);
  return !!m;
}
function dcNumberFromCallsign(cs){
  const c = (cs||"").toUpperCase().replace(/\s+/g,"");
  const m = c.match(/^DC-?0?(\d{1,2})$/);
  if(!m) return Infinity;
  const n = parseInt(m[1],10);
  return isNaN(n) ? Infinity : n;
}

// ═══════════════════════════════════════════
// DOM HELPERS
// ═══════════════════════════════════════════
const $ = s => document.querySelector(s);
function uid(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function escapeHtml(s){
  return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function toast(msg="Copied"){
  const t=$("#toast"); t.textContent=msg; t.style.display="block";
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.style.display="none",900);
}
async function copyText(txt){
  try{ await navigator.clipboard.writeText(txt); toast("Copied"); }
  catch{ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); toast("Copied"); }
}

// ═══════════════════════════════════════════
// DATE / TIME
// ═══════════════════════════════════════════
function startOfMonth(d){ const x=new Date(d); x.setDate(1); x.setHours(0,0,0,0); return x; }
function endOfMonth(d){ const x=new Date(d); x.setMonth(x.getMonth()+1); x.setDate(1); x.setHours(0,0,0,0); return x; }
function fmtMonthLabel(d){ return new Intl.DateTimeFormat("en-US",{month:"long",year:"numeric"}).format(d); }
function toLocalISODate(iso){
  const d=new Date(iso);
  const p=new Intl.DateTimeFormat("en-CA",{timeZone:TZ,year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(d);
  return `${p.find(x=>x.type==="year").value}-${p.find(x=>x.type==="month").value}-${p.find(x=>x.type==="day").value}`;
}
function formatLocal(iso){
  if(!iso) return "";
  return new Intl.DateTimeFormat("en-US",{timeZone:TZ,month:"2-digit",day:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}).format(new Date(iso));
}
function durLabel(ms){
  const m=Math.max(0,Math.round(ms/(1000*60))); const h=Math.floor(m/60); const mn=m%60;
  if(h<=0) return `${mn}m`; if(mn===0) return `${h}h`; return `${h}h ${mn}m`;
}
function daysSince(iso){ return iso ? (Date.now()-new Date(iso).getTime())/(1000*60*60*24) : Infinity; }
function fmtMDY(d){ const dt=d instanceof Date?d:new Date(d); return `${String(dt.getMonth()+1).padStart(2,"0")}/${String(dt.getDate()).padStart(2,"0")}/${dt.getFullYear()}`; }
function dateValueFromISO(iso){ if(!iso) return ""; const d=new Date(iso); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function isoFromDateValue(ymd){ const s=(ymd||'').trim(); if(!s) return null; const dt=new Date(`${s}T12:00:00`); return isNaN(dt.getTime())?null:dt.toISOString(); }
function dateInputToISOStart(ymd){ const m=(ymd||'').match(/^(\d{4})-(\d{2})-(\d{2})$/); if(!m) return null; return new Date(+m[1],+m[2]-1,+m[3],0,0,0,0).toISOString(); }
function dateInputToISOEnd(ymd){ const m=(ymd||'').match(/^(\d{4})-(\d{2})-(\d{2})$/); if(!m) return null; return new Date(+m[1],+m[2]-1,+m[3],23,59,59,999).toISOString(); }
function dateValueFromStored(s){ if(!s) return ''; if(s.includes('T')) return dateValueFromISO(s); if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s; return ''; }

// ═══════════════════════════════════════════
// CSV PARSER
// ═══════════════════════════════════════════
function parseCSV(text){
  const out=[]; let i=0,field="",row=[],inQ=false;
  function pf(){ row.push(field); field=""; }
  function pr(){ if(row.some(x=>(x??"").trim()!=="")) out.push(row); row=[]; }
  while(i<text.length){
    const c=text[i];
    if(inQ){ if(c==='"'&&text[i+1]==='"'){field+='"';i+=2;continue;} if(c==='"'){inQ=false;i++;continue;} field+=c;i++;continue; }
    else{ if(c==='"'){inQ=true;i++;continue;} if(c===','){pf();i++;continue;} if(c==='\r'){i++;continue;} if(c==='\n'){pf();pr();i++;continue;} field+=c;i++;continue; }
  }
  pf(); pr();
  const headers=(out.shift()||[]).map(h=>h.trim());
  return out.map(r=>{ const obj={}; headers.forEach((h,idx)=>obj[h]=(r[idx]??"").trim()); return obj; });
}
function normalizeType(t){ const x=(t||"").toUpperCase(); if(x.includes("IN")) return "IN"; if(x.includes("OUT")) return "OUT"; return ""; }

    selectedId:null,
    ui:{inactiveOnly:false,showArchived:false,view:"hub",reviewTab:"eotm"},

function load(){
  try{
    const raw=localStorage.getItem(STORE_KEY);

      // try migrating from v7
      const old=localStorage.getItem("casinoTracker.local.v7");
      if(old){
        const data=JSON.parse(old);
        if(data && Array.isArray(data.people)){
          data.version=8;
          data.profileMonthCursor=data.monthCursor||new Date().toISOString();
          data.overviewMonthCursor=data.monthCursor||new Date().toISOString();

          data.ui.view=data.ui.view||"hub";
          data.ui.reviewTab=data.ui.reviewTab||"eotm";
          return data;
        }
      }
      return seed();
    }
    const data=JSON.parse(raw);
    if(!data||!Array.isArray(data.people)) return seed();
    data.clockEvents||=[];data.loas||=[];data.entries||=[];data.notesEntries||=[];data.eotmHistory||=[];

function isOnLOA(pid,when=new Date()){ const t=when.getTime(); return state.loas.some(l=>l.personId===pid&&new Date(l.startISO).getTime()<=t&&t<=new Date(l.endISO).getTime()); }

function normalizeKind(k){ const v=(k||'').trim(); if(!v) return 'Commendation'; if(v==='Correction') return 'Correction'; if(v==='Comment') return 'Commendation'; if(v==='Discipline') return 'Strike'; return v; }
function isStrike(e){ return normalizeKind(e.kind)==="Strike"; }
function strikesInMonth(pid,md){ const f=startOfMonth(md),t=endOfMonth(md); return entriesForPerson(pid).filter(e=>isStrike(e)).filter(e=>{const d=new Date(e.dateISO);return d>=f&&d<t;}).length; }

// ═══════════════════════════════════════════
// ACTIVITY POLICY (NEW)
// 4 hours per calendar month, 30-min shift min
// Miss 1 month = warning outreach
// Miss 2 consecutive = separation
// Hitting hours after a miss = clean slate reset
// ═══════════════════════════════════════════
function getMonthlyHoursMs(pid, monthDate){
  return computeMonthly(pid, monthDate).countedMs;
}

function activityStatus(pid){
  const now = new Date();
  if(isOnLOA(pid, now)) return { state:'LOA', missedMonths:0, message:null };

  const thisMonth = startOfMonth(now);
  const lastMonth = startOfMonth(new Date(thisMonth.getFullYear(), thisMonth.getMonth()-1, 1));
  const twoMonthsAgo = startOfMonth(new Date(thisMonth.getFullYear(), thisMonth.getMonth()-2, 1));

  const thisMonthMs = getMonthlyHoursMs(pid, thisMonth);
  const lastMonthMs = getMonthlyHoursMs(pid, lastMonth);
  const twoMonthsAgoMs = getMonthlyHoursMs(pid, twoMonthsAgo);

  const lastMonthMet = lastMonthMs >= MONTHLY_MIN_MS;
  const twoMonthsMet = twoMonthsAgoMs >= MONTHLY_MIN_MS;

  // Check LOA coverage for those months
  const lastMonthLOA = isOnLOA(pid, new Date(lastMonth.getFullYear(), lastMonth.getMonth(), 15));
  const twoMonthsLOA = isOnLOA(pid, new Date(twoMonthsAgo.getFullYear(), twoMonthsAgo.getMonth(), 15));

  // If current month meets requirement, clean slate
  if(thisMonthMs >= MONTHLY_MIN_MS) return { state:'ACTIVE', missedMonths:0, message:null };

  // Two consecutive misses (not LOA) = separation needed
  if(!lastMonthMet && !lastMonthLOA && !twoMonthsMet && !twoMonthsLOA){
    return { state:'SEPARATION', missedMonths:2, message:'separation' };
  }

  // One missed month = warning
  if(!lastMonthMet && !lastMonthLOA){
    return { state:'WARNING', missedMonths:1, message:'warning' };
  }

  // Current month in progress, hasn't hit yet but no missed history
  if(thisMonthMs < MONTHLY_MIN_MS){
    const daysLeft = new Date(thisMonth.getFullYear(), thisMonth.getMonth()+1, 0).getDate() - now.getDate();
    return { state:'PENDING', missedMonths:0, message:null, hoursNeeded: durLabel(MONTHLY_MIN_MS - thisMonthMs), daysLeft };
  }

  return { state:'ACTIVE', missedMonths:0, message:null };
}

function activityMsgTemplate(which, name){
  name = name || "there";
  if(which==='warning'){
    return `Hey ${name}! Just checking in — you didn't hit the 4-hour minimum last month.\n\nWe require at least 4 hours of clock-in time per calendar month (30-minute shift minimum) to stay active on roster. If you need LOA, let me know and we'll get you covered.\n\nThis is your first miss — hit your hours this month and you're back to a clean slate. Two consecutive missed months means separation from the roster.\n\nThanks!`;
  }
  return `Hey ${name}. You've now missed the 4-hour minimum for two consecutive months.\n\nPer our activity policy, two consecutive missed months means separation from the casino roster. If there are circumstances we should know about, please reach out.\n\nYou're welcome to reapply in the future. Thank you for your time with us.`;
}

// ═══════════════════════════════════════════
// SHIFT COMPUTATION
// ═══════════════════════════════════════════
function computeMonthly(pid, monthDate){
  const from=startOfMonth(monthDate), to=endOfMonth(monthDate);
  const all=eventsForPerson(pid);
  const monthEvents=all.filter(e=>{const t=new Date(e.timeISO);return t>=from&&t<to;});
  let openIn=null, countedMs=0, redMs=0;
  const byDay=new Map();

  function addSeg(inISO,outISO,ms,isRed,flag){
    const dk=toLocalISODate(inISO);
    const cur=byDay.get(dk)||{countedMs:0,redMs:0,segments:[]};
    cur.segments.push({in:inISO,out:outISO,ms,isRed,flag});
    cur.countedMs+=ms; if(isRed) cur.redMs+=ms;
    byDay.set(dk,cur);
  }

  for(const e of monthEvents){
    if(e.type==="IN"){
      if(openIn){
        const ms=MIN_SHIFT_MINUTES*60*1000;
        countedMs+=ms;
        addSeg(openIn.timeISO, new Date(new Date(openIn.timeISO).getTime()+ms).toISOString(), ms, false, "AUTO-CAPPED (missing clock-out)");
      }
      openIn=e;
    } else if(e.type==="OUT"){
      if(!openIn) continue;
      const ms=new Date(e.timeISO)-new Date(openIn.timeISO);
      if(ms<=0){openIn=null;continue;}
      countedMs+=ms;
      if(ms/(1000*60)<MIN_SHIFT_MINUTES){
        redMs+=ms;
        addSeg(openIn.timeISO, e.timeISO, ms, true, `UNDER ${MIN_SHIFT_MINUTES} MIN (flagged but counted)`);
      } else {
        addSeg(openIn.timeISO, e.timeISO, ms, false, "");
      }
      openIn=null;
    }
  }
  if(openIn){
    const ms=MIN_SHIFT_MINUTES*60*1000; countedMs+=ms;
    addSeg(openIn.timeISO, new Date(new Date(openIn.timeISO).getTime()+ms).toISOString(), ms, false, "AUTO-CAPPED (missing clock-out)");
  }
  return {countedMs, redMs, byDay};
}

function computeTotalsAllTime(pid){
  const all=eventsForPerson(pid); let openIn=null, ms=0;
  for(const e of all){
    if(e.type==="IN"){ if(openIn) ms+=MIN_SHIFT_MINUTES*60*1000; openIn=e; }
    else if(e.type==="OUT"){ if(!openIn) continue; const d=new Date(e.timeISO)-new Date(openIn.timeISO); if(d>0) ms+=d; openIn=null; }
  }
  if(openIn) ms+=MIN_SHIFT_MINUTES*60*1000;
  return ms;
}

// ═══════════════════════════════════════════
function clockEventExists(pid,type,timeISO){ return state.clockEvents.some(e=>e.personId===pid&&e.type===type&&e.timeISO===timeISO); }
function findPersonForRow(r){
  const steam=(r["Steam"]||"").trim(), character=(r["Character"]||"").trim();
  if(steam) return state.people.find(p=>(p.steam||"").trim()===steam)||null;
  if(character) return state.people.find(p=>(p.character||"").trim().toLowerCase()===character.toLowerCase())||null;
  return null;
}
function autoCreatePersonFromRow(r,timeISO){
  const p={id:uid(),steam:(r["Steam"]||"").trim(),steamName:(r["Steam Name"]||"").trim(),
    character:(r["Character"]||"").trim(),callsign:(r["Callsign"]||"").trim(),
    discord:"",discordId:"",timeZone:"",bankAccount:"",rank:"",priorityRole:"",crossTrain:[],
    training:{sop:{done:false,trainerId:"",date:"",comment:""},roles:{}},notes:""};
  try{const d=Math.floor((Date.now()-new Date(timeISO).getTime())/(1000*60*60*24));if(isFinite(d)&&d>120)p.archived=true;}catch{}
  ensurePerson(p); state.people.push(p); return p;
}

function importCSVFile(file){
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const parsed=parseCSV(reader.result);
      if(!parsed.length) throw new Error("CSV had no rows.");
      const req=["Steam","Steam Name","Callsign","Character","Type","Time"];
      for(const k of req) if(!(k in parsed[0])) throw new Error(`Missing column: ${k}`);
      let created=0,updated=0,added=0,skipped=0;
      for(const r of parsed){
        const type=normalizeType(r["Type"]),timeISO=(r["Time"]||"").trim();
        const character=(r["Character"]||"").trim(),steam=(r["Steam"]||"").trim();
        if(!type||!timeISO||isNaN(new Date(timeISO).getTime())||(!steam&&!character)){skipped++;continue;}
        let p=findPersonForRow(r);
        if(!p){p=autoCreatePersonFromRow(r,timeISO);created++;}
        else{
          ensurePerson(p);
          try{const d=Math.floor((Date.now()-new Date(timeISO).getTime())/(1000*60*60*24));if(p.archived&&isFinite(d)&&d<=14)p.archived=false;}catch{}
          const canUpdate=!p.archived;
          if(canUpdate){
            const sn=(r["Steam Name"]||"").trim(),cs=(r["Callsign"]||"").trim(),ch=(r["Character"]||"").trim();
            if(sn)p.steamName=sn; if(cs)p.callsign=cs; if(ch)p.character=ch;
          }
          if(steam&&!p.steam) p.steam=steam;
          ensurePerson(p); updated++;
        }
        if(clockEventExists(p.id,type,timeISO)){skipped++;continue;}
        state.clockEvents.push({id:uid(),personId:p.id,type,timeISO,source:"csv"}); added++;
      }
      save(); alert(`CSV imported.\nCreated: ${created}\nUpdated: ${updated}\nEvents: ${added}\nSkipped: ${skipped}`);
      if(state.selectedId) renderProfile(); else renderHub();
    }catch(e){ alert("CSV import failed: "+e.message); }
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════
// RENDER: HUB
// ═══════════════════════════════════════════
function renderHub(){
  $("#hubView").style.display="";
  $("#profileView").style.display="none";
  $("#overviewView").style.display="none";
  document.getElementById('reviewView').style.display="none";
  $("#backBtn").style.display="none";
  $("#searchBar").style.display="";
  state.ui.view="hub"; state.selectedId=null;
  // Reset hub to current month always
  state.monthCursor=new Date().toISOString();
  save();

  const q=($("#search").value||"").trim().toLowerCase();
  const sort=$("#sort").value;
  const monthDate=startOfMonth(new Date());
  const showArchived=!!(state.ui?.showArchived);
  const inactiveOnly=!!(state.ui?.inactiveOnly);

  const ib=$("#inactiveBtn");
  if(ib){ ib.className=`btn-${inactiveOnly?'accent':'ghost'} btn-sm`; ib.textContent=inactiveOnly?'Inactive ✓':'Inactive'; }
  const pb=$("#pastBtn");
  if(pb){ pb.className=`btn-${showArchived?'accent':'ghost'} btn-sm`; pb.textContent=showArchived?'Graveyard ✓':'Graveyard'; }

  const items=state.people.filter(p=>showArchived?!!p.archived:!p.archived).map(p=>{
    ensurePerson(p);
    const monthly=computeMonthly(p.id,monthDate);
    const total=computeTotalsAllTime(p.id);
    const lastIn=lastClockInISO(p.id);
    const activity=activityStatus(p.id);
    const hay=`${p.character} ${p.steamName} ${p.callsign} ${p.steam}`.toLowerCase();
    const pass=!q||hay.includes(q);
    const strikes=strikesInMonth(p.id,monthDate);
    return {p,monthly,total,lastIn,activity,strikes,pass};
  }).filter(x=>x.pass)
    .filter(x=>!inactiveOnly||(x.activity.state==='WARNING'||x.activity.state==='SEPARATION'));

  function byName(a,b){ return (a.p.character||"").localeCompare(b.p.character||"",undefined,{sensitivity:"base"}); }
  function byDc(a,b){ const an=dcNumberFromCallsign(a.p.callsign),bn=dcNumberFromCallsign(b.p.callsign); return an===bn?byName(a,b):an-bn; }

  items.sort((a,b)=>{
    if(sort==="az") return byName(a,b);
    if(sort==="dc") return byDc(a,b);
    if(sort==="month_desc") return (b.monthly.countedMs-a.monthly.countedMs)||byName(a,b);
    if(sort==="month_asc") return (a.monthly.countedMs-b.monthly.countedMs)||byName(a,b);
    if(sort==="total_desc") return (b.total-a.total)||byName(a,b);
    if(sort==="total_asc") return (a.total-b.total)||byName(a,b);
    if(sort==="recent"){ const bt=b.lastIn?new Date(b.lastIn).getTime():0,at=a.lastIn?new Date(a.lastIn).getTime():0; return (bt-at)||byName(a,b); }
    if(sort==="least_recent"){ const at=a.lastIn?new Date(a.lastIn).getTime():0,bt=b.lastIn?new Date(b.lastIn).getTime():0; return (at-bt)||byName(a,b); }
    return byName(a,b);
  });

  const cards=$("#cards");
  cards.innerHTML="";
  if(!items.length){cards.innerHTML=`<div class="panel" style="padding:16px"><div class="muted">No matches.</div></div>`;return;}

  for(const it of items){
    const p=it.p, a=it.activity;
    let badge="";
    if(a.state==='LOA') badge=`<span class="pill loa">LOA</span>`;
    else if(a.state==='SEPARATION') badge=`<span class="pill bad">SEPARATION</span>`;
    else if(a.state==='WARNING') badge=`<span class="pill warn">WARNING</span>`;
    else if(a.state==='PENDING') badge=`<span class="pill accent">${it.monthly.countedMs>0?durLabel(it.monthly.countedMs)+' / 4h':'PENDING'}</span>`;
    else badge=`<span class="pill good">ACTIVE</span>`;
    if(it.strikes>=3) badge+=` <span class="pill bad">3 STRIKES</span>`;

    const el=document.createElement("div"); el.className="card";
    el.innerHTML=`
      <div class="card-top">
        <div>
          <div class="card-name">${escapeHtml(p.character||"(no name)")}</div>
          <div class="card-meta">${escapeHtml(p.callsign||"—")} · ${escapeHtml(p.steamName||"—")}</div>
        </div>
        ${badge}
      </div>
      <div class="card-bottom">
        <div>
          <div class="card-hours">${escapeHtml(durLabel(it.monthly.countedMs))}</div>
          <div class="card-hours-sub">this month</div>
        </div>
        <div class="card-total">Total: ${escapeHtml(durLabel(it.total))}</div>
      </div>
      ${showArchived?`<button class="btn-accent btn-sm" style="margin-top:8px;align-self:flex-end" data-revive="${escapeHtml(p.id)}">Revive</button>`:''}
    `;
    el.addEventListener("click",e=>{
      if(e.target.matches("button[data-revive]")) return;
      state.selectedId=p.id; state.profileMonthCursor=new Date().toISOString();
      state.ui.view="profile"; save(); renderProfile();
    });
    cards.appendChild(el);
  }
  // Wire revive buttons
  document.querySelectorAll("button[data-revive]").forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.preventDefault();e.stopPropagation();
      const pp=state.people.find(x=>x.id===btn.getAttribute("data-revive"));
      if(pp){pp.archived=false;save();renderHub();}
    });
  });
}

// RENDER: HOURS OVERVIEW
// ═══════════════════════════════════════════
function renderOverview(){
  $("#hubView").style.display="none";
  $("#profileView").style.display="none";
  $("#overviewView").style.display="";
  document.getElementById('reviewView').style.display="none";
  $("#backBtn").style.display="";
  $("#searchBar").style.display="none";
  state.ui.view="overview"; save();

  const md=startOfMonth(new Date(state.overviewMonthCursor));
  $("#ovMonthLabel").textContent=fmtMonthLabel(md);

  const items=state.people.filter(p=>!p.archived).map(p=>{
    ensurePerson(p);
    const monthly=computeMonthly(p.id,md);
    return {name:p.character||p.steamName||"Unknown", callsign:p.callsign||"", ms:monthly.countedMs, excluded:isMgmtCallsign(p.callsign)};
  }).filter(x=>!x.excluded).sort((a,b)=>b.ms-a.ms);

  const maxMs=Math.max(...items.map(x=>x.ms), MONTHLY_MIN_MS);
  const chart=$("#hoursChart");

  chart.innerHTML=items.map(it=>{
    const pct=maxMs>0?Math.round(it.ms/maxMs*100):0;
    const met=it.ms>=MONTHLY_MIN_MS;
    const color=met?'var(--good)':'var(--bad)';
    const bg=met?'var(--good-dim)':'var(--bad-dim)';
    return `
      <div class="chart-row">
        <div class="chart-label" title="${escapeHtml(it.callsign)}">${escapeHtml(it.name)}</div>
        <div class="chart-bar-bg">
          <div class="chart-bar-fill" style="width:${pct}%;background:${color};"></div>
          <div style="position:absolute;left:${Math.min(Math.round(MONTHLY_MIN_MS/maxMs*100),100)}%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.2);"></div>
        </div>
        <div class="chart-value">${escapeHtml(durLabel(it.ms))}</div>
      </div>
    `;
  }).join('')||`<div class="muted">No active employees.</div>`;
}

function renderProfile(){

  $("#profileView").style.display="";

  // Basic Info
  const copyIcon=`<svg viewBox="0 0 24 24" fill="none"><path d="M9 9h9v10a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2V11a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.8"/><path d="M7 13H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg>`;
  const basicRows=[
    {k:'Rank',v:p.rank||'—'},{k:'Discord',v:p.discord||'—'},
    {k:'Discord ID',v:p.discordId||'—',copy:p.discordId},{k:'Steam ID',v:p.steam||'—',copy:p.steam},
    {k:'Timezone',v:p.timeZone||'—'},{k:'Bank ID',v:p.bankAccount||'—',copy:p.bankAccount},
  ];
  $("#basicInfo").innerHTML=basicRows.map(r=>`
    <div class="info-row">
      <div class="info-key">${escapeHtml(r.k)}</div>

// RENDER: TRAINING (REBUILT)
// ═══════════════════════════════════════════
function renderTraining(pid){
  const p=getPerson(pid);
  if(!p) return;
  const sopDone=!!(p.training.sop?.done);

  // Snapshot pills
  const snap=document.getElementById('trainSnap');
  if(snap){
    const sopCls=sopDone?'done':'todo';
    let pills=`<span class="train-pill ${sopCls}"><span class="dot"></span>SOP</span>`;
    pills+=FIXED_ROLES.map(role=>{
      const r=p.training.roles[role]||{};
      const trained=!!(r.date);
      const cls=trained?'done':(sopDone?'todo':'locked');
      return `<span class="train-pill ${cls}"><span class="dot"></span>${escapeHtml(role)}</span>`;
    }).join('');
    snap.innerHTML=pills;
  }

  // Detail section
  const host=$("#training");
  const trainers=managementTrainerOptions();
  function trainerName(id){ const t=trainers.find(x=>x.id===id); return t?t.label:'—'; }

  // Priority role & cross-train line
  const priLabel=p.priorityRole||'None';
  const crossLabel=(p.crossTrain||[]).length?p.crossTrain.join(', '):'None';

  let detailHtml=`
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px;font-size:12px;">
      <div><span class="muted">Priority:</span> <b>${escapeHtml(priLabel)}</b></div>
      <div><span class="muted">Cross-train:</span> <b>${escapeHtml(crossLabel)}</b></div>
    </div>
  `;

  // SOP row
  detailHtml+=`<div class="train-detail">`;
  detailHtml+=`<div class="train-detail-row">
    <div><b>SOP</b></div>
    <div>${sopDone?`<span class="pill good" style="font-size:10px">Done</span>`:`<span class="pill warn" style="font-size:10px">Not Done</span>`}</div>
    <div class="muted">${sopDone&&p.training.sop.date?escapeHtml(fmtMDY(new Date(p.training.sop.date))):''}</div>
    <div class="muted">${sopDone?escapeHtml(trainerName(p.training.sop.trainerId)):''}</div>
  </div>`;

  // Role rows
  for(const role of FIXED_ROLES){
    const r=p.training.roles[role]||{};
    const trained=!!(r.date);
    const locked=!sopDone;
    detailHtml+=`<div class="train-detail-row">
      <div><b>${escapeHtml(role)}</b></div>
      <div>${locked?`<span class="pill" style="font-size:10px;opacity:.5">Locked</span>`:
        trained?`<span class="pill good" style="font-size:10px">Trained</span>`:`<span class="pill" style="font-size:10px">Not trained</span>`}</div>
      <div class="muted">${trained?escapeHtml(fmtMDY(new Date(r.date))):''}</div>
      <div class="muted">${trained?escapeHtml(trainerName(r.trainerId)):''}</div>
    </div>`;
  }
  detailHtml+=`</div>`;

  // Edit button
  detailHtml+=`<div style="display:flex;justify-content:flex-end;gap:6px;margin-top:10px">
    <button class="btn-ghost btn-sm" id="editTrainingBtn">Edit Training</button>
  </div>`;

  // Training notes
  const tNotes=trainingNotesForPerson(pid);
  detailHtml+=`<div class="divider"></div>`;
  detailHtml+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div class="muted small" style="font-weight:700;text-transform:uppercase;letter-spacing:.5px">Training Notes</div>
    <button class="btn-ghost btn-sm" id="addTrainNoteBtn">+ Note</button>
  </div>`;
  detailHtml+=tNotes.map(n=>`
    <div class="note-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="note-date">${escapeHtml(fmtMDY(new Date(n.dateISO)))}</div>
        <div style="display:flex;gap:4px">
          <button class="btn-ghost btn-sm" data-edit-tnote="${escapeHtml(n.id)}">Edit</button>
          <button class="btn-ghost btn-sm" data-del-tnote="${escapeHtml(n.id)}">Del</button>
        </div>
      </div>
      <div class="note-text">${escapeHtml(n.note||'')}</div>
    </div>
  `).join('')||`<div class="muted small">No training notes yet.</div>`;

  host.innerHTML=detailHtml;

  // Wire buttons
  document.getElementById('editTrainingBtn')?.addEventListener('click',()=>openTrainingModal(pid));
  document.getElementById('addTrainNoteBtn')?.addEventListener('click',()=>openTrainingNoteModal(pid,null));
  document.querySelectorAll('[data-edit-tnote]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const n=(state.trainingNotes||[]).find(x=>x.id===btn.getAttribute('data-edit-tnote'));
      if(n) openTrainingNoteModal(pid,n);
    });
  });
  document.querySelectorAll('[data-del-tnote]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.trainingNotes=(state.trainingNotes||[]).filter(x=>x.id!==btn.getAttribute('data-del-tnote'));
      save(); renderTraining(pid);
    });
  });
}

function openTrainingModal(pid){
  const p=getPerson(pid); if(!p) return;
  const trainers=managementTrainerOptions();
  const trOpts=(sel)=>[`<option value="">—</option>`].concat(trainers.map(t=>`<option value="${escapeHtml(t.id)}" ${t.id===sel?"selected":""}>${escapeHtml(t.label)}</option>`)).join('');
  const sopDone=!!p.training.sop?.done;
  const roleOpts=FIXED_ROLES.map(r=>`<option value="${escapeHtml(r)}" ${p.priorityRole===r?"selected":""}>${escapeHtml(r)}</option>`).join('');
  const crossChecks=FIXED_ROLES.map(r=>`<label style="display:flex;gap:6px;align-items:center;font-size:12px"><input type="checkbox" data-cross="${escapeHtml(r)}" ${(p.crossTrain||[]).includes(r)?'checked':''}/>${escapeHtml(r)}</label>`).join('');

  let html=`
    <div class="row"><div><div class="muted small">Priority Role</div><select id="t_pri"><option value="">—</option>${roleOpts}</select></div>
    <div><div class="muted small">Cross-train</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">${crossChecks}</div></div></div>
    <div class="divider"></div>
    <div class="muted small" style="font-weight:700;margin-bottom:8px">SOP</div>
    <div class="row">
      <div><div class="muted small">Status</div><select id="t_sop"><option value="no" ${!sopDone?'selected':''}>Not Done</option><option value="yes" ${sopDone?'selected':''}>Done</option></select></div>
      <div><div class="muted small">Trainer</div><select id="t_sop_tr">${trOpts(p.training.sop?.trainerId||'')}</select></div>
      <div><div class="muted small">Date</div><input type="date" id="t_sop_dt" value="${escapeHtml(dateValueFromStored(p.training.sop?.date||''))}"></div>
    </div>
    <div class="divider"></div>
    <div class="muted small" style="font-weight:700;margin-bottom:8px">Role Training</div>
  `;

  for(const role of FIXED_ROLES){
    const r=p.training.roles[role]||{};
    html+=`<div style="margin-bottom:10px"><div style="font-weight:700;font-size:12px;margin-bottom:4px">${escapeHtml(role)}</div>
      <div class="row">
        <div><div class="muted small">Trainer</div><select data-rt="${escapeHtml(role)}">${trOpts(r.trainerId||'')}</select></div>
        <div><div class="muted small">Date</div><input type="date" data-rd="${escapeHtml(role)}" value="${escapeHtml(dateValueFromStored(r.date||''))}"></div>
      </div></div>`;
  }

  html+=`<div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn-accent" id="t_save">Save</button></div>`;

  openModal("Edit Training", html);

  document.getElementById('t_save').addEventListener('click',()=>{
    p.priorityRole=document.getElementById('t_pri').value||'';
    p.crossTrain=FIXED_ROLES.filter(r=>{const cb=document.querySelector(`input[data-cross="${CSS.escape(r)}"]`);return cb?.checked;});
    p.training.sop={done:document.getElementById('t_sop').value==='yes', trainerId:document.getElementById('t_sop_tr').value||'',
      date:(document.getElementById('t_sop_dt').value||'').trim(), comment:p.training.sop?.comment||''};
    for(const role of FIXED_ROLES){
      const tr=document.querySelector(`select[data-rt="${CSS.escape(role)}"]`);
      const dt=document.querySelector(`input[data-rd="${CSS.escape(role)}"]`);
      p.training.roles[role]={trainerId:tr?.value||'',date:(dt?.value||'').trim(),comment:p.training.roles[role]?.comment||''};
    }
    save();closeModal();renderProfile();toast("Training saved");
  });
}

function openTrainingNoteModal(pid, existing){
  const title=existing?"Edit Training Note":"Add Training Note";
  const dateVal=existing?dateValueFromISO(existing.dateISO):dateValueFromISO(new Date().toISOString());
  openModal(title,`
    <div class="row"><div><div class="muted small">Date</div><input type="date" id="tn_date" value="${escapeHtml(dateVal)}"/></div></div>
    <div style="margin-top:8px"><div class="muted small">Note</div><textarea id="tn_text" rows="4" placeholder="Training notes...">${escapeHtml(existing?.note||'')}</textarea></div>
    <div style="display:flex;justify-content:flex-end;margin-top:10px"><button class="btn-accent" id="tn_save">Save</button></div>
  `);
  document.getElementById('tn_save').addEventListener('click',()=>{
    const ds=(document.getElementById('tn_date').value||'').trim();
    if(!ds) return alert('Pick a date.');
    const text=(document.getElementById('tn_text').value||'').trim();
    if(!text) return alert('Note cannot be empty.');
    if(existing){existing.dateISO=isoFromDateValue(ds);existing.note=text;}
    else{state.trainingNotes||=[];state.trainingNotes.push({id:uid(),personId:pid,dateISO:isoFromDateValue(ds),note:text});}
    save();closeModal();renderProfile();
  });
}

// ═══════════════════════════════════════════
// RENDER: CALENDAR
// ═══════════════════════════════════════════
function renderCalendar(pid){
  const month=startOfMonth(new Date(state.profileMonthCursor));
  const year=month.getFullYear(), mIdx=month.getMonth();
  const monthly=computeMonthly(pid,month);
  const loas=loasForPerson(pid);
  const calEvents=calEventsForPerson(pid);

  const loaDays=new Set();
  for(const l of loas){
    const s=new Date(l.startISO),e=new Date(l.endISO),cur=new Date(s);cur.setHours(0,0,0,0);
    while(cur<=e){ if(cur.getFullYear()===year&&cur.getMonth()===mIdx){ loaDays.add(`${year}-${String(mIdx+1).padStart(2,"0")}-${String(cur.getDate()).padStart(2,"0")}`); } cur.setDate(cur.getDate()+1); }
  }

  // Build calendar event day map
  const calEventDays=new Map();
  for(const ce of calEvents){
    const dk=dateValueFromISO(ce.dateISO);
    if(!dk) continue;
    const [cy,cm]=dk.split('-').map(Number);
    if(cy===year&&cm===mIdx+1){
      const arr=calEventDays.get(dk)||[];
      arr.push(ce);
      calEventDays.set(dk,arr);
    }
  }

  const firstDay=new Date(year,mIdx,1);
  const startWeekday=firstDay.getDay();
  const daysInMonth=new Date(year,mIdx+1,0).getDate();
  const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  let html=`<div class="cal-grid">`;
  for(const n of dayNames) html+=`<div class="cal-head">${n}</div>`;
  for(let i=0;i<startWeekday;i++) html+=`<div></div>`;

  for(let day=1;day<=daysInMonth;day++){
    const key=`${year}-${String(mIdx+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const info=monthly.byDay.get(key);
    const onLOA=loaDays.has(key);
    const dayEvents=calEventDays.get(key)||[];

    let cls="cal-day", label="", sub="", clickable=false;
    if(onLOA){cls+=" loa";label="LOA";clickable=true;}
    if(info&&info.countedMs>0){
      cls=cls.replace(/\bloa\b/g,"")+(info.redMs>0?" bad":" good");
      label=durLabel(info.countedMs);
      sub=info.redMs>0?"Flagged":"";
      clickable=true;
    }
    if(dayEvents.length) clickable=true;

    // Tags
    let tags="";
    if(info&&info.countedMs>0) tags+=`<span class="day-tag shift"></span>`;
    if(onLOA) tags+=`<span class="day-tag loa-tag"></span>`;
    for(const ce of dayEvents){
      const tagCls=ce.type==='training'?'training':ce.type==='interview'?'interview':'event';
      tags+=`<span class="day-tag ${tagCls}"></span>`;
    }

    html+=`<div class="${cls}" data-day="${key}" style="cursor:${clickable?'pointer':'default'}">
      <div class="day-num">${day}</div>
      <div class="day-tags">${tags}</div>
      <div><div class="day-label">${escapeHtml(label)}</div><div class="day-sub">${escapeHtml(sub)}</div></div>
    </div>`;
  }
  html+=`</div>`;
  html+=`<div style="display:flex;gap:10px;margin-top:8px;font-size:10px;color:var(--muted);flex-wrap:wrap">
    <span><span class="day-tag shift" style="display:inline-block;vertical-align:middle"></span> Shift</span>
    <span><span class="day-tag training" style="display:inline-block;vertical-align:middle"></span> Training</span>
    <span><span class="day-tag interview" style="display:inline-block;vertical-align:middle"></span> Interview</span>
    <span><span class="day-tag event" style="display:inline-block;vertical-align:middle"></span> Event</span>
    <span><span class="day-tag loa-tag" style="display:inline-block;vertical-align:middle"></span> LOA</span>
  </div>`;
  $("#calendar").innerHTML=html;

  $("#calendar").querySelectorAll("[data-day]").forEach(el=>{
    el.addEventListener("click",()=>{
      const dayKey=el.getAttribute("data-day");
      const info=monthly.byDay.get(dayKey);
      const loaInfo=loas.find(l=>{const d=new Date(dayKey+"T12:00:00"),s=new Date(l.startISO),e=new Date(l.endISO);return s<=d&&d<=e;});
      const dayEvts=(calEventDays.get(dayKey)||[]);
      if(!info&&!loaInfo&&!dayEvts.length) return;
      openModal("Day Details",buildDayDetailHtml(dayKey,info,loaInfo,dayEvts));
    });
  });

  return monthly;
}

function buildDayDetailHtml(dayKey,info,loa,calEvts=[]){
  const dateObj=new Date(dayKey+"T00:00:00");
  const pretty=new Intl.DateTimeFormat("en-US",{month:"long",day:"numeric",year:"numeric"}).format(dateObj);
  let html=`<div style="font-weight:900;font-size:16px;margin-bottom:10px">${escapeHtml(pretty)}</div>`;

  if(loa){
    html+=`<div class="pill loa" style="margin-bottom:6px">LOA — ${escapeHtml(loa.reason||"")}</div>
      <div class="muted small">${escapeHtml(fmtMDY(loa.startISO))} → ${escapeHtml(fmtMDY(loa.endISO))}</div>`;
  }

  if(info&&info.segments.length){
    html+=`<div style="display:flex;gap:6px;margin:10px 0"><span class="pill good">Counted: ${escapeHtml(durLabel(info.countedMs))}</span><span class="pill bad">Flagged: ${escapeHtml(durLabel(info.redMs||0))}</span></div>`;
    for(const s of info.segments){
      html+=`<div style="padding:8px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;background:${s.isRed?'var(--bad-dim)':'var(--good-dim)'};font-size:12px">
        <div><b>IN:</b> ${escapeHtml(formatLocal(s.in))} → <b>OUT:</b> ${escapeHtml(formatLocal(s.out))}</div>
        <div style="margin-top:4px"><span class="pill ${s.isRed?'bad':'good'}" style="font-size:10px">${escapeHtml(durLabel(s.ms))}</span></div>
        ${s.flag?`<div class="muted small" style="margin-top:4px">${escapeHtml(s.flag)}</div>`:''}
      </div>`;
    }
  }

  if(calEvts.length){
    html+=`<div style="font-weight:700;font-size:12px;margin:10px 0 6px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">Events</div>`;
    for(const ce of calEvts){
      const typeColors={training:'var(--cyan)',interview:'var(--accent)',meeting:'var(--warn)',other:'var(--muted)'};
      html+=`<div style="padding:8px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;font-size:12px">
        <span class="pill" style="font-size:10px;border-color:${typeColors[ce.type]||typeColors.other}">${escapeHtml(ce.type)}</span>
        <div style="margin-top:4px">${escapeHtml(ce.note||'')}</div>
      </div>`;
    }
  }

  if(!info&&!loa&&!calEvts.length) html+=`<div class="muted">Nothing recorded for this day.</div>`;
  return html;
}

function renderReviewPage(){
  state.ui.view="review"; save();
  $("#hubView").style.display="none";
  $("#profileView").style.display="none";
  $("#overviewView").style.display="none";
  document.getElementById('reviewView').style.display="";
  $("#backBtn").style.display="";
  $("#searchBar").style.display="none";

  const monthDate=startOfMonth(new Date(state.monthCursor));
  const sub=document.getElementById('reviewSub');
  if(sub) sub.textContent=`Reviewing ${fmtMonthLabel(monthDate)}`;

  const base=state.people.map(p=>{ensurePerson(p);const m=computeMonthly(p.id,monthDate);const c=monthContextCounts(p.id,monthDate);
    return {p,monthly:m,excluded:isMgmtCallsign(p.callsign),counts:c,loaNow:isOnLOA(p.id,monthDate)};}).filter(x=>!x.excluded&&!x.p.archived);

  const tab=state.ui.reviewTab||"eotm";
  const tabE=document.getElementById('reviewTabEotm'),tabP=document.getElementById('reviewTabPromo');
  if(tabE) tabE.className=`btn-${tab==='eotm'?'accent':'ghost'} btn-sm`;
  if(tabP) tabP.className=`btn-${tab==='promo'?'accent':'ghost'} btn-sm`;

  const eotm=base.slice().sort((a,b)=>b.monthly.countedMs-a.monthly.countedMs).slice(0,3);
  const promos=base.filter(x=>x.monthly.countedMs>=MONTHLY_MIN_MS).sort((a,b)=>(a.p.rank||'').localeCompare(b.p.rank||'')||(b.monthly.countedMs-a.monthly.countedMs));

  function card(x,showMark=false){
    const lastE=lastEotmLabel(x.p.id);
    return `<div style="padding:12px;border:1px solid var(--line);border-radius:var(--r);margin-bottom:8px;background:var(--panel)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
        <div><div style="font-weight:900">${escapeHtml(x.p.character||'')}</div>
          <div class="muted small">${escapeHtml(x.p.callsign||'')} · ${escapeHtml(x.p.rank||'')}</div></div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          ${x.loaNow?'<span class="pill loa">LOA</span>':''}
          <span class="pill good">${escapeHtml(durLabel(x.monthly.countedMs))}</span>
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--muted);flex-wrap:wrap">
        <span>Corrections: <b>${x.counts.corrections}</b></span>
        <span>Commendations: <b>${x.counts.commendations}</b></span>
        <span>Strikes: <b>${x.counts.strikes}</b></span>
        <span>Last EOTM: <b>${escapeHtml(lastE)}</b></span>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:6px;margin-top:8px">
        <button class="btn-ghost btn-sm" data-review-profile="${escapeHtml(x.p.id)}">View Profile</button>
        ${showMark?`<button class="btn-accent btn-sm" data-mark-eotm="${escapeHtml(x.p.id)}">Mark EOTM</button>`:''}
      </div>
    </div>`;
  }

  let html='';
  if(tab==='eotm'){
    html+=`<div class="hint" style="margin-bottom:10px"><b>Top 3</b> by monthly hours for EOTM consideration. DC1–DC19 excluded.</div>`;
    html+=eotm.length?eotm.map(x=>card(x,true)).join(''):`<div class="muted">No candidates yet.</div>`;
  } else {
    html+=`<div class="hint" style="margin-bottom:10px"><b>Eligible</b> for promotion — met ${MONTHLY_MIN_HOURS}hr minimum. DC1–DC19 excluded.</div>`;
    html+=promos.length?promos.map(x=>card(x,false)).join(''):`<div class="muted">No one meets the baseline yet.</div>`;
  }

  $("#reviewBody").innerHTML=html;
  document.querySelectorAll('[data-review-profile]').forEach(btn=>{btn.addEventListener('click',()=>{state.selectedId=btn.getAttribute('data-review-profile');state.profileMonthCursor=new Date().toISOString();state.ui.view='profile';save();renderProfile();});});
  document.querySelectorAll('[data-mark-eotm]').forEach(btn=>{btn.addEventListener('click',()=>markEotm(btn.getAttribute('data-mark-eotm'),monthDate));});
}

function openLOAModal(existingId=null){
  const p=getPerson(state.selectedId); if(!p) return;
  const existing=existingId?state.loas.find(x=>x.id===existingId):null;
  const today=new Date();
  const ds=existing?dateValueFromISO(existing.startISO):dateValueFromISO(today.toISOString());
  const de=existing?dateValueFromISO(existing.endISO):dateValueFromISO(new Date(today.getFullYear(),today.getMonth(),today.getDate()+7).toISOString());
  openModal(existing?"Edit LOA":"Add LOA",`
    <div class="hint" style="margin-bottom:10px">LOA pauses activity requirements. Hours still count if they clock in.</div>
    <div class="row"><div><div class="muted small">Start</div><input id="loa_start" type="date" value="${escapeHtml(ds)}"></div>

    <div style="display:flex;justify-content:flex-end;margin-top:10px"><button class="btn-accent" id="loa_save">${existing?'Save Changes':'Add LOA'}</button></div>
  `);
  document.getElementById('loa_save').addEventListener('click',()=>{
    const s=(document.getElementById('loa_start').value||'').trim(),e=(document.getElementById('loa_end').value||'').trim();
    if(!s||!e) return alert('Need both dates.'); const sISO=dateInputToISOStart(s),eISO=dateInputToISOEnd(e);

    else{state.loas.push({id:uid(),personId:p.id,startISO:sISO,endISO:eISO,reason});}
    save();closeModal();renderProfile();
  });

const ovP=document.getElementById('ovPrev');
if(ovP) ovP.addEventListener('click',()=>{
  const d=startOfMonth(new Date(state.overviewMonthCursor));
  d.setMonth(d.getMonth()-1); state.overviewMonthCursor=d.toISOString(); save(); renderOverview();
});
const ovN=document.getElementById('ovNext');
if(ovN) ovN.addEventListener('click',()=>{
  const d=startOfMonth(new Date(state.overviewMonthCursor));
  d.setMonth(d.getMonth()+1); state.overviewMonthCursor=d.toISOString(); save(); renderOverview();
});

$("#search").addEventListener("input",()=>{if(state.ui?.view==='hub') renderHub();});
$("#sort").addEventListener("change",()=>{if(state.ui?.view==='hub') renderHub();});

document.getElementById('reviewTabEotm')?.addEventListener('click',()=>{state.ui.reviewTab='eotm';save();renderReviewPage();});
document.getElementById('reviewTabPromo')?.addEventListener('click',()=>{state.ui.reviewTab='promo';save();renderReviewPage();});

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
if(state.ui?.view==="review") renderReviewPage();
else if(state.ui?.view==="overview") renderOverview();
else if(state.selectedId) renderProfile();
else renderHub();
</script>
</body>
</html>
